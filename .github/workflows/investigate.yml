# Tier 2 investigation - powered by kenotron-ms/amplifier-app-actions
#
# Triggered by two paths:
#   Path A: /investigate comment from a trusted contributor
#   Path B: needs-investigation label applied (typically by Tier 1 triage)
#
# enable_reproduction: true installs Incus on the runner so the agent can
# call launch_dtu to reproduce issues in an isolated container.
#
# Docs: https://github.com/kenotron-ms/amplifier-app-actions

name: Investigate

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  investigate:
    if: >-
      (github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/investigate') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
      ||
      (github.event_name == 'issues' && github.event.label.name == 'needs-investigation')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: kenotron-ms/amplifier-app-actions@main
        with:
          enable_reproduction: true
          recipe_source: .github/amplifier/investigate-recipe.yaml
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
