# Issue Triage — autonomous Attractor triage pipeline
#
# Fires when a new issue is opened, or when someone comments "/triage" on an
# existing issue. Runs the Attractor triage-review pipeline fully autonomously
# (no human-in-the-loop): it reads the issue, investigates the codebase,
# quality-gates the root cause, then posts a triage comment + labels and a
# `/resolve new_instance(...)` command.
#
# NOTE: the exact amplifier-attractor CLI invocation and install command may
# need adjustment during testing; the skeleton here is correct.

name: Issue Triage

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/triage'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6

      - name: Install attractor runtime
        run: |
          uv pip install --system 'amplifier-bundle-dev-support[attractor] @ git+https://github.com/kenotron-ms/amplifier-bundle-dev-support.git@main'

      - name: Run triage pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          echo "Triaging issue #${ISSUE_NUMBER} in ${REPO_FULL_NAME}..."
          amplifier-attractor run \
            --pipeline .github/amplifier/triage-review.dot \
            --context .github/amplifier/triage-context.md \
            --goal "Triage issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}\n\n${ISSUE_BODY}" \
            --repo "${REPO_FULL_NAME}" \
            --issue "${ISSUE_NUMBER}" \
            || echo "::warning::Triage pipeline failed for issue #${ISSUE_NUMBER}"
