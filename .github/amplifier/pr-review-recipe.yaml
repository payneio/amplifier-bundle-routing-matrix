name: PR Review
version: 1.1.0
description: >
  Structured PR review in four steps: identify what changed and which repos provide
  context, clone those repos, apply the five-check review framework, then post a
  structured verdict comment. The comment is the primary output.

context:
  context:
    number: 0
    owner: ""
    repo: ""
    title: ""
    body: ""
    author: ""
    base_ref: ""
    head_ref: ""
    labels: []
    event_type: ""

steps:
  - id: identify
    type: agent
    agent: foundation:explorer
    prompt: |
      Review PR #{{ context.number }} in {{ context.owner }}/{{ context.repo }}.

      Title: {{ context.title }}
      Description:
      {{ context.body }}
      Author: {{ context.author }}
      Base: {{ context.base_ref }} → Head: {{ context.head_ref }}

      Using tool-filesystem, read the list of changed files in this PR.

      Then, using the ecosystem map available to you:
      1. List the files that changed
      2. Identify which other repos in the Amplifier ecosystem are relevant context
         for understanding these changes — repos whose code is called by, calls into,
         or is semantically related to the changed code

      Respond only with valid JSON:
      {"changed_files": ["path/to/file"], "relevant_repos": ["owner/repo"], "change_summary": "2-3 sentence summary of what this PR does"}
    parse_json: true

  - id: checkout_context
    type: agent
    agent: foundation:explorer
    depends_on: [identify]
    prompt: |
      Clone these repos for review context: {{ identify.relevant_repos }}

      For each repo, use github_checkout_repo with the owner and repo name.
      If the PR description references a specific branch or commit in another repo, use that ref.
      Otherwise, use the default branch.

      Respond only with valid JSON:
      {"checked_out": [{"repo": "owner/repo", "path": "/path/to/clone", "ref": "..."}]}
    parse_json: true

  - id: review
    type: agent
    agent: foundation:zen-architect
    depends_on: [checkout_context]
    prompt: |
      Review PR #{{ context.number }}: {{ context.title }}

      Changed files: {{ identify.changed_files }}
      Context repos cloned at: {{ checkout_context.checked_out }}

      Read each changed file IN FULL using tool-filesystem — not just the diff.
      Read related files: callers, tests, interfaces, canonical examples.
      The diff is an entry point, not the review.

      Apply these five checks in order. For each check, cite the specific file:line
      that supports your assessment. Do not raise a concern you cannot point to in code.

      1. Necessity: What concrete problem does this solve? What cannot be done without it?
         Is this the right time for this change?

      2. Layer fit: Is this change in the right repository and at the right architectural layer?
         A change touching multiple unrelated layers is a design smell.

      3. Pattern: What pattern does this enable or establish? Is it fully supported end-to-end?
         Is the pattern documented and guided?

      4. Correctness: Are there bugs, logic errors, or unhandled edge cases?
         Cite file:line for every concern.

      5. Calibration: Do not raise style preferences. Do not speculate. Only raise
         concerns you can support with evidence from the code.

      Respond only with valid JSON:
      {"verdict": "approve|approve-with-fixes|hold-for-design|needs-more-context", "findings": [{"check": "...", "file": "...", "line": 0, "detail": "..."}], "open_questions": ["..."]}
    parse_json: true

  - id: post_verdict
    type: agent
    agent: foundation:modular-builder
    depends_on: [review]
    prompt: |
      Use github_post_comment to post a review on PR #{{ context.number }} in {{ context.owner }}/{{ context.repo }}.

      Format the comment as:

      **Summary**: {{ identify.change_summary }}

      **Verdict**: {{ review.verdict }}

      **Findings**
      {% for finding in review.findings %}
      - [{{ finding.check }}] `{{ finding.file }}:{{ finding.line }}` — {{ finding.detail }}
      {% endfor %}

      {% if review.open_questions %}
      **Open questions**
      {% for q in review.open_questions %}
      - {{ q }}
      {% endfor %}
      {% endif %}

      Every finding links to a specific file and line. No finding without evidence.
