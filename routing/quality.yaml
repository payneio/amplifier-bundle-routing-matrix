# Routing Matrix: quality
#
# Maps semantic roles to ranked provider/model candidates.
# The routing hook tries candidates top-to-bottom, using the first
# that matches an installed provider.
#
# Philosophy: best available models per role. Cost is a secondary concern.
#
# Schema:
#   provider: Module mount name (e.g., "anthropic", "gemini", "github-copilot")
#   model:    Exact model name or class-scoped glob. Copilot PINNED (no static
#             fallback in provider). Non-Copilot uses class-scoped globs so new
#             within-class releases (Opus 4.6 -> 4.7 -> 4.10) auto-resolve via
#             the version-aware sort.
#   config:   Optional model parameters (e.g., reasoning_effort: high|xhigh)
#
# Required roles: "general" and "fast" must be defined in every matrix.
# All other roles are optional — agents fall back through their model_role list.
#
# Ordering rule: Anthropic above OpenAI in every multi-provider role.
#
# Curated by Amplifier Foundation team. See docs/MATRIX_CURATOR_GUIDE.md.

name: quality
description: "Best available models. Prioritizes capability over cost."
updated: "2026-05-12"

roles:
  general:
    description: "Versatile catch-all, no specialization needed"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: "gpt-[0-9].[0-9]"
        config:
          reasoning_effort: low
      - provider: gemini
        model: gemini-*-pro-preview
      - provider: github-copilot
        model: claude-sonnet-4.6

  fast:
    description: "Quick utility tasks — parsing, classification, file ops, bulk work"
    candidates:
