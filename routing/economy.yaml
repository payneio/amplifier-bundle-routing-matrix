# Routing Matrix: economy
#
# Maps semantic roles to ranked provider/model candidates.
# The routing hook tries candidates top-to-bottom, using the first
# that matches an installed provider.
#
# Philosophy: budget-first. Prefer cheap tier (Haiku, *-mini, Flash, Flash-Lite)
# for utility roles. Reserve mid-tier (Sonnet, gpt-[0-9].[0-9]) for quality-sensitive
# roles like security-audit, critique, creative, writing, research.
#
# Schema:
#   provider: Module mount name (e.g., "anthropic", "gemini", "github-copilot")
#   model:    Exact model name or class-scoped glob. Copilot PINNED.
#   config:   Optional model parameters (e.g., reasoning_effort: high|xhigh)
#
# Required roles: "general" and "fast" must be defined in every matrix.
# All other roles are optional — agents fall back through their model_role list.
#
# Ordering rule: Anthropic above OpenAI in every multi-provider role.
#
# Curated by Amplifier Foundation team. See docs/MATRIX_CURATOR_GUIDE.md.

name: economy
description: "Cost-optimized routing. Prefers free tiers and budget models."
updated: "2026-05-12"

roles:
  general:
    description: "Versatile catch-all, no specialization needed"
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-?.?-mini*
      - provider: gemini
        model: gemini-*-flash-lite-preview
      - provider: gemini
        model: gemini-*-flash-preview
      - provider: github-copilot
        model: claude-haiku-4.5
      - provider: ollama
        model: "*"

  fast:
    description: "Quick utility tasks — parsing, classification, file ops, bulk work"
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-?.?-nano*
      - provider: openai
        model: gpt-?.?-mini*
      - provider: gemini
        model: gemini-*-flash-lite-preview
      - provider: gemini
        model: gemini-*-flash-preview
      - provider: github-copilot
        model: claude-haiku-4.5
      - provider: github-copilot
        model: gpt-5.4-mini
      - provider: ollama
        model: "*"

  coding:
    description: "Code generation, implementation, debugging"
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-?.?-mini*
      - provider: gemini
        model: gemini-*-flash-preview
      - provider: github-copilot
        model: claude-haiku-4.5
      - provider: ollama
        model: "*"

  ui-coding:
    description: "Frontend/UI code — components, layouts, styling, spatial reasoning"
    candidates:
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-?.?-mini*
      - provider: gemini
        model: gemini-*-flash-preview
      - provider: github-copilot
        model: claude-haiku-4.5

  security-audit:
    description: "Vulnerability assessment, attack surface analysis, code auditing"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
        config:
          reasoning_effort: high
      - provider: openai
        model: "gpt-[0-9].[0-9]"
        config:
          reasoning_effort: high
      - provider: gemini
        model: gemini-*-pro-preview
        config:
          reasoning_effort: high
      - provider: github-copilot
        model: claude-sonnet-4.6
        config:
          reasoning_effort: high

  reasoning:
    description: "Deep architectural reasoning, system design, complex multi-step analysis"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: "gpt-[0-9].[0-9]"
      - provider: gemini
        model: gemini-*-pro-preview
      - provider: github-copilot
        model: claude-sonnet-4.6
      - provider: github-copilot
        model: gpt-5.5

  critique:
    description: "Analytical evaluation — finding flaws in existing work, not generating solutions"
    candidates:
      # Anthropic promoted above OpenAI per ordering rule (2026-04-22).
      - provider: anthropic
        model: claude-sonnet-*
        config:
          reasoning_effort: xhigh
      - provider: openai
        model: "gpt-[0-9].[0-9]"
        config:
          reasoning_effort: xhigh
      - provider: gemini
        model: gemini-*-pro-preview
        config:
          reasoning_effort: xhigh
      - provider: github-copilot
        model: gpt-5.5
        config:
          reasoning_effort: xhigh

  creative:
    description: "Design direction, aesthetic judgment, high-quality creative output"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: "gpt-[0-9].[0-9]"
      - provider: gemini
        model: gemini-*-pro-preview
      - provider: github-copilot
        model: claude-sonnet-4.6

  writing:
    description: "Long-form content — documentation, marketing, case studies, storytelling"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: "gpt-[0-9].[0-9]"
      - provider: gemini
        model: gemini-*-pro-preview
      - provider: github-copilot
        model: claude-sonnet-4.6

  research:
    description: "Deep investigation, information synthesis across multiple sources"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: "gpt-[0-9].[0-9]"
      - provider: gemini
        model: gemini-*-pro-preview
      - provider: github-copilot
        model: claude-sonnet-4.6

  vision:
    description: "Understanding visual input — screenshots, diagrams, UI mockups"
    candidates:
      # Anthropic promoted above OpenAI per ordering rule (2026-04-22).
      - provider: gemini
        model: gemini-*-flash-preview
      - provider: github-copilot
        model: claude-haiku-4.5
      - provider: anthropic
        model: claude-haiku-*
      - provider: openai
        model: gpt-?.?-mini*

  image-gen:
    description: "Image generation, visual mockup creation, visual ideation"
    candidates:
      - provider: gemini
        model: nano-banana-pro-preview

  critical-ops:
    description: "High-reliability operational tasks — infrastructure, orchestration, coordination"
    candidates:
      - provider: anthropic
        model: claude-sonnet-*
      - provider: openai
        model: "gpt-[0-9].[0-9]"
      - provider: gemini
        model: gemini-*-pro-preview
      - provider: github-copilot
        model: claude-sonnet-4.6
